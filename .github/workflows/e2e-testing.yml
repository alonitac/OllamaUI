# .github/workflows/e2e-testing.yml

name: Simple Deploy to EC2

on:
  pull_request:
    branches: [ master ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.build_push.outputs.image_tag }}
    steps:
      - name: Get code
        uses: actions/checkout@v4

      - name: Build and push Docker image
        id: build_push
        run: |
          echo ${{ secrets.DOCKERHUB_PASSWORD }} | docker login -u ${{ secrets.DOCKERHUB_USERNAME }} --password-stdin
          TAG="${{ github.sha }}-$(date +%Y%m%d-%H%M%S)"
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/ollama-ui:$TAG .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/ollama-ui:$TAG
          echo "IMAGE_TAG=$TAG" >> $GITHUB_ENV
          echo "image_tag=$TAG" >> $GITHUB_OUTPUT

      - name: Copy docker-compose to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.yml"
          target: "/home/ubuntu/"

      - name: Deploy on EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -euo pipefail
            cd /home/ubuntu

            # התקנת Docker אם צריך
            sudo apt-get remove -y podman-docker podman || true
            if ! command -v docker >/dev/null 2>&1; then
              sudo apt-get update -y
              sudo apt-get install -y ca-certificates curl gnupg
              sudo install -m 0755 -d /etc/apt/keyrings
              curl -fsSL https://download.docker.com/linux/ubuntu/gpg | sudo gpg --dearmor -o /etc/apt/keyrings/docker.gpg
              echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu $(. /etc/os-release; echo $VERSION_CODENAME) stable" \
                | sudo tee /etc/apt/sources.list.d/docker.list > /dev/null
              sudo apt-get update -y
              sudo apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin
              sudo systemctl enable --now docker
            fi

            echo "${{ secrets.DOCKERHUB_PASSWORD }}" | sudo docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
            sudo mkdir -p uploads

            # .env שה-compose יקרא
            cat > .env <<EOF
            DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}
            OLLAMA_UI_IMG_TAG=${{ env.IMAGE_TAG }}

            YOLO_SERVICE=http://yolo:8081

            AWS_REGION=eu-west-1
            AWS_S3_BUCKET=tameer-yolo-images

            POSTGRES_USER=postgres
            POSTGRES_PASSWORD=postgrespass
            POSTGRES_DB=predictions
            POSTGRES_VERSION=16

            YOLO_PORT=8081
            OLLAMA_PORT=3000
            POSTGRES_PORT=5432
            EOF

            ###########################
            # ניקוי לפני משיכת images #
            ###########################
            echo "=== Disk usage BEFORE ==="
            df -h || true
            sudo docker system df || true

            # עוצר את כל הקונטיינרים (שים לב אם יש שירותים אחרים על השרת)
            sudo docker stop $(sudo docker ps -aq) 2>/dev/null || true
            # ניקוי אגרסיבי של Docker: images/containers/volumes שלא בשימוש
            sudo docker system prune -af --volumes || true
            # ניקוי build cache
            sudo docker builder prune -af || true

            # ניקוי מטמון apt כדי לשחרר עוד מקום
            sudo apt-get clean || true
            sudo rm -rf /var/lib/apt/lists/* || true

            echo "=== Disk usage AFTER CLEAN ==="
            df -h || true
            sudo docker system df || true

            # פריסה
            sudo docker compose --env-file .env pull
            sudo docker compose --env-file .env down || true
            sudo docker compose --env-file .env up -d
            sudo docker compose --env-file .env ps

  selenium-matrix-tests:
    runs-on: ubuntu-latest
    needs: deploy
    strategy:
      matrix:
        browser: [chrome, firefox]
        resolution:
          - { name: "desktop-full", width: 1920, height: 1080 }
          - { name: "laptop",       width: 1366, height: 768 }
          - { name: "tablet",       width: 1024, height: 768 }
          - { name: "mobile",       width: 375,  height: 667 }
      fail-fast: false
    name: Test ${{ matrix.browser }} - ${{ matrix.resolution.name }}

    steps:
      - name: Checkout OllamaUITesting
        uses: actions/checkout@v4
        with:
          repository: tmeraslan/OllamaUITesting
          path: .
          clean: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install allure-pytest

      - name: Setup Chrome
        if: matrix.browser == 'chrome'
        uses: browser-actions/setup-chrome@v1

      - name: Setup Firefox
        if: matrix.browser == 'firefox'
        uses: browser-actions/setup-firefox@v1

      - name: Wait for app to be ready (same URL used by tests)
        env:
          URL: http://${{ secrets.EC2_HOST }}:3000/
        run: |
          for i in {1..60}; do
            if curl -fsS "$URL" >/dev/null; then
              echo "App is up: $URL"
              exit 0
            fi
            echo "Waiting for app... ($i)"
            sleep 5
          done
          echo "App not ready at $URL" >&2
          exit 1

      - name: Create Allure environment (global)
        run: |
          mkdir -p allure-results
          cat > allure-results/environment.properties << EOF
          Target.URL=http://${{ secrets.EC2_HOST }}:3000/
          Commit=${{ github.sha }}
          OllamaUI.Image=${{ secrets.DOCKERHUB_USERNAME }}/ollama-ui:${{ needs.deploy.outputs.image_tag }}
          YOLO.Image=tameer/yolo:991e7ebc1a6fbd6136517e56d68bdf843b749ef9-20250903-071354
          Postgres.Image=postgres:15
          CI.Platform=GitHub Actions
          EOF

      - name: Inject Allure matrix params (browser/resolution as test parameters)
        run: |
          cat > conftest.py << 'PY'
          import os, pytest
          try:
              import allure
          except Exception:
              allure = None

          @pytest.fixture(autouse=True)
          def _allure_add_matrix_params():
              if not allure:
                  return
              browser = os.getenv('BROWSER', 'unknown')
              res_name = os.getenv('TEST_NAME', 'unknown')
              width = os.getenv('SCREEN_WIDTH', '')
              height = os.getenv('SCREEN_HEIGHT', '')
              try:
                  allure.dynamic.parameter('browser', browser)
                  allure.dynamic.parameter('resolution', res_name)
                  if width and height:
                      allure.dynamic.parameter('screen', f"{width}x{height}")
              except Exception:
                  pass
          PY

      - name: Run Selenium tests
        env:
          HEADLESS: true
          BROWSER: ${{ matrix.browser }}
          SCREEN_WIDTH: ${{ matrix.resolution.width }}
          SCREEN_HEIGHT: ${{ matrix.resolution.height }}
          RESOLUTION: ${{ matrix.resolution.name }}
          OLLAMA_URL: http://${{ secrets.EC2_HOST }}:3000/
          TEST_NAME: ${{ matrix.browser }}-${{ matrix.resolution.name }}
          ENVIRONMENT: staging
        run: |
          mkdir -p allure-results
          URL="${OLLAMA_URL%/}/"
          for i in {1..30}; do
            if curl -fsS "$URL" >/dev/null; then
              break
            fi
            echo "Retry app check... ($i)"
            sleep 3
          done
          pytest --alluredir=allure-results tests/

      - name: Upload Allure results as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results-${{ matrix.browser }}-${{ matrix.resolution.name }}
          path: allure-results/
          retention-days: 30

  allure-report:
    runs-on: ubuntu-latest
    needs: selenium-matrix-tests
    if: always()
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all Allure results
        uses: actions/download-artifact@v4
        with:
          pattern: allure-results-*
          path: allure-results-downloaded
          merge-multiple: false

      - name: Merge all results into single directory (and set global environment)
        run: |
          mkdir -p allure-results
          for dir in allure-results-downloaded/*/; do
            if [ -d "$dir" ]; then
              cp -r "$dir"* allure-results/ 2>/dev/null || true
            fi
          done

          cat > allure-results/categories.json << 'EOF'
          [
            {"name": "Chrome",  "matchedStatuses": ["passed","failed","broken"], "messageRegex": ".*chrome.*"},
            {"name": "Firefox", "matchedStatuses": ["passed","failed","broken"], "messageRegex": ".*firefox.*"},
            {"name": "Desktop", "matchedStatuses": ["passed","failed","broken"], "messageRegex": ".*desktop.*"},
            {"name": "Mobile",  "matchedStatuses": ["passed","failed","broken"], "messageRegex": ".*mobile.*"},
            {"name": "Tablet",  "matchedStatuses": ["passed","failed","broken"], "messageRegex": ".*tablet.*"},
            {"name": "Laptop",  "matchedStatuses": ["passed","failed","broken"], "messageRegex": ".*laptop.*"}
          ]
          EOF

          cat > allure-results/environment.properties << EOF
          Target.URL=http://${{ secrets.EC2_HOST }}:3000/
          Commit=${{ github.sha }}
          OllamaUI.Image=${{ secrets.DOCKERHUB_USERNAME }}/ollama-ui:${{ needs.deploy.outputs.image_tag }}
          YOLO.Image=tameer/yolo:991e7ebc1a6fbd6136517e56d68bdf843b749ef9-20250903-071354
          Postgres.Image=postgres:15
          CI.Platform=GitHub Actions
          EOF

          echo "Allure files:"
          ls -la allure-results || true

      - name: Generate and Deploy Allure Report
        uses: simple-elf/allure-report-action@master
        with:
          allure_results: allure-results
          allure_report: allure-report
          gh_pages: gh-pages
          allure_history: allure-history
          keep_reports: 20

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.UI_TESTING_GITHUB_TOKEN }}
          publish_dir: allure-history















