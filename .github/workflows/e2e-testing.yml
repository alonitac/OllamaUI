
#e2e-testing.yml



name: Simple Deploy to EC2

on:
  pull_request:
    branches: [ master ]   # ודא שזה באמת branch ברירת המחדל שלך

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Get code
        uses: actions/checkout@v4

      - name: Build and push Docker image
        run: |
          # Login to DockerHub
          echo ${{ secrets.DOCKERHUB_PASSWORD }} | docker login -u ${{ secrets.DOCKERHUB_USERNAME }} --password-stdin

          TAG="${{ github.sha }}-$(date +%Y%m%d-%H%M%S)"

          # בונים ודוחפים ל-<user>/ollamaui (לא ollama)
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/ollama-ui:$TAG .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/ollama-ui:$TAG

          # שומרים את ה-TAG לשימוש בשלבים הבאים
          echo "IMAGE_TAG=$TAG" >> $GITHUB_ENV

      - name: Copy docker-compose to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.yml"     # ודא שהשם בקוד הוא .yml
          target: "/home/ubuntu/"

      - name: Deploy on EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -euo pipefail
            cd /home/ubuntu

            # מסירים podman-docker במקרה והוא מותקן
            sudo apt-get remove -y podman-docker podman || true

            # מתקינים Docker Engine + Compose v2 אם צריך
            if ! command -v docker >/dev/null 2>&1; then
              sudo apt-get update -y
              sudo apt-get install -y ca-certificates curl gnupg
              sudo install -m 0755 -d /etc/apt/keyrings
              curl -fsSL https://download.docker.com/linux/ubuntu/gpg | sudo gpg --dearmor -o /etc/apt/keyrings/docker.gpg
              echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] \
              https://download.docker.com/linux/ubuntu $(. /etc/os-release; echo $VERSION_CODENAME) stable" | \
                sudo tee /etc/apt/sources.list.d/docker.list > /dev/null
              sudo apt-get update -y
              sudo apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin
              sudo systemctl enable --now docker
            fi

            # Login ל-Docker Hub על השרת (גם לפאבליק זה מזרז/מונע rate-limit)
            echo "${{ secrets.DOCKERHUB_PASSWORD }}" | sudo docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

            # תקיית mount ל-uploads אם נדרש ע"י compose
            sudo mkdir -p uploads

            # קובץ .env לאינטרפולציה ב-compose
            cat > .env <<EOF
            DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}
            OLLAMA_UI_IMG_TAG=${{ env.IMAGE_TAG }}
            EOF

            # דיפלוי
            sudo docker compose --env-file .env pull
            sudo docker compose --env-file .env down || true
            sudo docker compose --env-file .env up -d
            sudo docker compose --env-file .env ps


  selenium-matrix-tests:
    runs-on: ubuntu-latest
    needs: deploy

    strategy:
      matrix:
        browser: [chrome, firefox]
        resolution:
          - { name: "desktop-full", width: 1920, height: 1080 }
          - { name: "laptop", width: 1366, height: 768 }
          - { name: "tablet", width: 1024, height: 768 }
          - { name: "mobile", width: 375, height: 667 }
      fail-fast: false

    name: Test ${{ matrix.browser }} - ${{ matrix.resolution.name }}

    steps:
      - name: Checkout OllamaUITesting
        uses: actions/checkout@v4
        with:
          repository: tameer/OllamaUITesting
          token: ${{ secrets.GITHUB_TOKEN }}
          path: .
          clean: true

      - name: Debug repo path
        run: |
          pwd
          ls -la

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install allure-pytest

      - name: Install Chrome and ChromeDriver
        if: matrix.browser == 'chrome'
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Install Firefox and GeckoDriver
        if: matrix.browser == 'firefox'
        run: |
          sudo apt-get update
          sudo apt-get install -y wget tar
          sudo snap remove firefox || true
          wget -O firefox.tar.xz "https://download.mozilla.org/?product=firefox-latest&os=linux64&lang=en-US"
          tar xJf firefox.tar.xz
          sudo mv firefox /opt/firefox
          sudo ln -s /opt/firefox/firefox /usr/local/bin/firefox
          wget https://github.com/mozilla/geckodriver/releases/latest/download/geckodriver-v0.36.0-linux64.tar.gz
          tar -xvzf geckodriver-v0.36.0-linux64.tar.gz
          sudo mv geckodriver /usr/local/bin/
          sudo chmod +x /usr/local/bin/geckodriver

      - name: Create Allure environment properties
        run: |
          mkdir -p allure-results
          cat > allure-results/environment.properties << EOF
          Browser=${{ matrix.browser }}
          Resolution=${{ matrix.resolution.name }}
          Screen.Width=${{ matrix.resolution.width }}
          Screen.Height=${{ matrix.resolution.height }}
          Test.Environment=${{ matrix.browser }}-${{ matrix.resolution.name }}
          Ollama.URL=http://${{ secrets.EC2_HOST }}:3000/
          Headless.Mode=true
          Ollama.Image=yosefshawah/ollama-ui:${{ needs.deploy.outputs.ollama_image_tag }}
          YOLO.Image=yosefshawah/yolo:0.0.3
          EOF

      - name: Inject Allure parameters for matrix run (append-safe)
        run: |
          if [ -f conftest.py ]; then
            cat >> conftest.py << 'PY'
          # --- BEGIN AUTO-ADDED: Allure matrix params ---
          import os
          import pytest
          try:
              import allure
          except Exception:
              allure = None

          @pytest.fixture(autouse=True)
          def _allure_add_matrix_params():
              if not allure:
                  return
              browser = os.getenv('BROWSER', 'unknown')
              res_name = os.getenv('TEST_NAME', 'unknown')
              width = os.getenv('SCREEN_WIDTH', '')
              height = os.getenv('SCREEN_HEIGHT', '')
              try:
                  allure.dynamic.parameter('browser', browser)
                  allure.dynamic.parameter('resolution', res_name)
                  if width and height:
                      allure.dynamic.parameter('screen', f"{width}x{height}")
              except Exception:
                  # Do not fail tests if allure is unavailable
                  pass
          # --- END AUTO-ADDED ---
          PY
          else
            cat > conftest.py << 'PY'
          import os
          import pytest
          try:
              import allure
          except Exception:
              allure = None

          @pytest.fixture(autouse=True)
          def _allure_add_matrix_params():
              if not allure:
                  return
              browser = os.getenv('BROWSER', 'unknown')
              res_name = os.getenv('TEST_NAME', 'unknown')
              width = os.getenv('SCREEN_WIDTH', '')
              height = os.getenv('SCREEN_HEIGHT', '')
              try:
                  allure.dynamic.parameter('browser', browser)
                  allure.dynamic.parameter('resolution', res_name)
                  if width and height:
                      allure.dynamic.parameter('screen', f"{width}x{height}")
              except Exception:
                  # Do not fail tests if allure is unavailable
                  pass
          PY
          fi

      - name: Run Selenium tests
        env:
          HEADLESS: true
          BROWSER: ${{ matrix.browser }}
          SCREEN_WIDTH: ${{ matrix.resolution.width }}
          SCREEN_HEIGHT: ${{ matrix.resolution.height }}
          OLLAMA_URL: http://${{ secrets.EC2_HOST }}:3000/
          TEST_NAME: ${{ matrix.browser }}-${{ matrix.resolution.name }}
          ALLURE_RESULTS_DIR: allure-results
        run: |
          pytest tests/ -v --tb=short --alluredir=allure-results

      - name: Upload Allure Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results-${{ matrix.browser }}-${{ matrix.resolution.name }}
          path: allure-results/
          retention-days: 30



























