
#e2e-testing.yml
name: Simple Deploy to EC2

on:
  pull_request:
    branches: [ master ]



jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Get code
      uses: actions/checkout@v4

    - name: Login to Docker Hub
      run: |
        echo "${{ secrets.DOCKERHUB_PASSWORD }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

    - name: Build & push OllamaUI image
      id: build
      shell: bash
      run: |
        TAG="${GITHUB_SHA}-$(date +%Y%m%d-%H%M%S)"
        IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/ollama:${TAG}"

        echo "Building ${IMAGE} ..."
        docker build -t "${IMAGE}" .

        echo "Pushing ${IMAGE} ..."
        docker push "${IMAGE}"

        # expose TAG and full image ref to later steps in THIS job
        echo "TAG=${TAG}"            >> "$GITHUB_OUTPUT"
        echo "IMAGE_FULL=${IMAGE}"   >> "$GITHUB_OUTPUT"

    - name: Copy docker-compose.yml to EC2
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ubuntu                  # <-- fixed (was $ubuntu)
        key: ${{ secrets.EC2_SSH_KEY }}
        source: "docker-compose.yml"
        target: "/home/ubuntu/"

    - name: Deploy on EC2
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ubuntu
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          set -euo pipefail
          cd /home/ubuntu

          # Write/override .env for Compose (Compose auto-loads .env in this dir)
          cat > .env <<EOF
          # Full image reference for the UI (repo:tag)
          OLLAMA_UI_IMG=${{ steps.build.outputs.IMAGE_FULL }}
          EOF

          echo "Using OLLAMA_UI_IMG=$(grep '^OLLAMA_UI_IMG' .env | cut -d= -f2-)"

          # Bring down old stack (ignore if not running), pull, then start
          docker compose down || true
          docker compose pull || true
          docker compose up -d

          # Optional: show status
          docker compose ps

